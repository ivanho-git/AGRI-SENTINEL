<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌱 AGRI-SENTINEL — Complete Your Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --green-800:#1b5e20;--green-700:#2e7d32;--green-600:#388e3c;
            --green-500:#43a047;--green-400:#66bb6a;--green-300:#81c784;--green-100:#e8f5e9;--green-50:#f1f8e9;
            --sun-600:#f9a825;--sun-100:#fffde7;
            --sky-600:#0277bd;--sky-100:#e1f5fe;--sky-300:#4fc3f7;
            --red-500:#ef4444;--red-100:#fef2f2;
            --bg:#f7f9f7;--card:#ffffff;
            --text:#1a2e1a;--text2:#3e5e3e;--text3:#7a9a7a;--text-faint:#b0c4b0;
            --border:#d5e5d0;--border-light:#e8f0e5;
            --shadow-sm:0 2px 8px rgba(30,70,30,.06);--shadow-md:0 4px 16px rgba(30,70,30,.10);
            --r:12px;--r-lg:16px;--r-xl:24px;--r-full:9999px;
        }
        body{font-family:'Inter',system-ui,sans-serif;background:#eef3eb;min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}
        body::before{content:'';position:fixed;inset:0;background:
            radial-gradient(ellipse at 20% 30%,rgba(102,187,106,.15) 0%,transparent 50%),
            radial-gradient(ellipse at 80% 70%,rgba(249,168,37,.10) 0%,transparent 50%),
            linear-gradient(175deg,#e8f5e9 0%,#f1f8e9 30%,#fafaf5 60%,#fffde7 100%);
            pointer-events:none;z-index:0}
        body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(46,125,50,.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
        @keyframes spin{to{transform:rotate(360deg)}}

        .topbar{background:linear-gradient(135deg,#14532d 0%,var(--green-800) 40%,var(--green-600) 100%);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 16px rgba(20,83,45,.25);position:sticky;top:0;z-index:100}
        .topbar-logo{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.3px}

        .container{max-width:520px;margin:0 auto;padding:20px 16px 40px;position:relative;z-index:1}
        .hero{text-align:center;margin-bottom:24px;animation:fadeUp .5s ease}
        .hero-icon{font-size:48px;margin-bottom:8px}
        .hero h1{font-size:20px;font-weight:800;color:var(--green-800)}
        .hero p{font-size:13px;color:var(--text3);margin-top:4px}

        .alert{padding:12px 16px;border-radius:var(--r);margin-bottom:16px;font-size:13px;font-weight:500;display:none;align-items:center;gap:8px;animation:fadeUp .3s}
        .alert.show{display:flex}
        .alert-err{background:var(--red-100);border:1px solid #fca5a5;color:var(--red-500)}
        .alert-ok{background:var(--green-100);border:1px solid var(--green-300);color:var(--green-700)}

        .card{background:rgba(255,255,255,.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:var(--r-lg);padding:22px 20px;margin-bottom:16px;box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,.6);border:1px solid var(--border-light);border-left:4px solid var(--green-400);animation:fadeUp .5s ease both}
        .card:nth-child(2){animation-delay:.05s}
        .card:nth-child(3){animation-delay:.1s}
        .card-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:12px;border-bottom:1.5px dashed var(--border)}
        .card-head .ico{font-size:22px}
        .card-head .ttl{font-size:14px;font-weight:700;color:var(--green-700)}

        .field{margin-bottom:16px}
        .label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
        .label .req{color:var(--red-500);font-size:10px}
        .input,.select{width:100%;padding:12px 14px;font-family:inherit;font-size:15px;font-weight:500;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none;transition:.2s;-webkit-appearance:none}
        .input:focus,.select:focus{border-color:var(--green-500);background:#fff;box-shadow:0 0 0 3px rgba(67,160,71,.1)}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        @media(max-width:480px){.row{grid-template-columns:1fr}}

        .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
        .type-opt{padding:18px 14px;border:2px solid var(--border);border-radius:var(--r);text-align:center;cursor:pointer;transition:.25s;background:linear-gradient(160deg,rgba(255,255,255,.8),rgba(241,248,233,.5))}
        .type-opt:hover{border-color:var(--green-400);background:linear-gradient(160deg,var(--green-50),var(--sun-100));transform:translateY(-2px);box-shadow:var(--shadow-sm)}
        .type-opt.on{border-color:var(--green-600);background:linear-gradient(160deg,var(--green-100),var(--green-50));box-shadow:0 4px 16px rgba(46,125,50,.15)}
        .type-opt input{display:none}
        .type-opt .ic{font-size:30px;margin-bottom:6px}
        .type-opt .t{font-size:14px;font-weight:700;color:var(--green-700)}
        .type-opt .d{font-size:11px;color:var(--text3);margin-top:2px}

        .measure{background:var(--sun-100);border:1.5px solid #ffe082;border-radius:var(--r);padding:16px;margin-top:12px;display:none}
        .measure.show{display:block;animation:fadeUp .3s ease}
        .measure-ttl{font-size:12px;font-weight:700;color:var(--sun-600);margin-bottom:12px;display:flex;align-items:center;gap:6px}
        .hint{font-size:11px;color:var(--text3);margin-top:4px}

        .gps-box{margin-top:14px}
        .gps-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;font-family:inherit;font-size:13px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;background:linear-gradient(135deg,var(--sky-600),var(--sky-300));color:#fff;box-shadow:0 3px 12px rgba(2,119,189,.25);transition:.2s}
        .gps-btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(2,119,189,.3)}
        .gps-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .gps-status{font-size:12px;color:var(--text3);margin-top:8px}
        .gps-result{margin-top:10px;padding:12px;background:var(--sky-100);border:1px solid var(--sky-300);border-radius:var(--r);display:none}
        .gps-result.show{display:flex;align-items:center;justify-content:space-between}
        .gps-result .info{font-size:11px;color:var(--sky-600)}
        .gps-result .info strong{display:block;font-size:12px;margin-bottom:2px}
        .gps-result .clear{background:none;border:none;color:var(--red-500);cursor:pointer;font-size:16px;padding:4px}

        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        .btn{width:100%;padding:16px;font-family:inherit;font-size:16px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--green-700),var(--green-500));color:#fff;box-shadow:0 6px 20px rgba(46,125,50,.3);margin-top:8px;position:relative;overflow:hidden}
        .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);background-size:200% 100%;animation:shimmer 3s infinite}
        .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 24px rgba(46,125,50,.35)}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .btn.loading .btn-text{display:none}
        .btn .spinner{display:none}
        .btn.loading .spinner{display:block}
        .spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

        @media(max-width:400px){.container{padding:16px 12px 32px}.card{padding:18px 16px}}
    </style>
</head>
<body>
    <header class="topbar"><div class="topbar-logo">🌱 AGRI-SENTINEL</div></header>
    <div class="container">
        <div class="hero">
            <div class="hero-icon">👨‍🌾</div>
            <h1>Complete Your Profile</h1>
            <p>Tell us about your farm for personalized advice</p>
            <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px">
                <div style="width:32px;height:4px;background:var(--green-500);border-radius:4px"></div>
                <div style="width:32px;height:4px;background:var(--green-500);border-radius:4px"></div>
                <div style="width:32px;height:4px;background:var(--border);border-radius:4px"></div>
            </div>
        </div>

        <div class="alert alert-err" id="errAlert"><span>⚠️</span><span id="errText"></span></div>
        <div class="alert alert-ok" id="okAlert"><span>✅</span><span id="okText"></span></div>

        <form id="onboardingForm" onsubmit="handleSubmit(event)">
            <div class="card">
                <div class="card-head"><span class="ico">👤</span><span class="ttl">Personal Details</span></div>
                <div class="field">
                    <label class="label">🧑‍🌾 Your Name <span class="req">*</span></label>
                    <input type="text" class="input" id="farmerName" placeholder="Enter your full name" required>
                </div>
                <div class="row">
                    <div class="field"><label class="label">🏘️ Village <span class="req">*</span></label><input type="text" class="input" id="village" placeholder="Your village" required></div>
                    <div class="field"><label class="label">🏛️ District <span class="req">*</span></label><input type="text" class="input" id="district" placeholder="Your district" required></div>
                </div>
                <div class="field">
                    <label class="label">📍 State <span class="req">*</span></label>
                    <select class="select" id="state" required>
                        <option value="">— Select State —</option>
                        <option>Andhra Pradesh</option><option>Assam</option><option>Bihar</option><option>Chhattisgarh</option><option>Gujarat</option><option>Haryana</option><option>Himachal Pradesh</option><option>Jharkhand</option><option>Karnataka</option><option>Kerala</option><option>Madhya Pradesh</option><option>Maharashtra</option><option>Odisha</option><option>Punjab</option><option>Rajasthan</option><option>Tamil Nadu</option><option>Telangana</option><option>Uttar Pradesh</option><option>Uttarakhand</option><option>West Bengal</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-head"><span class="ico">🌾</span><span class="ttl">Land Information</span></div>
                <label class="label">🏡 Type of Land <span class="req">*</span></label>
                <div class="type-grid">
                    <label class="type-opt" id="fieldOption" onclick="selectType('Field')"><input type="radio" name="usage_type" value="Field"><div class="ic">🌾</div><div class="t">Field</div><div class="d">Large farm land</div></label>
                    <label class="type-opt" id="gardenOption" onclick="selectType('Garden')"><input type="radio" name="usage_type" value="Garden"><div class="ic">🏡</div><div class="t">Garden</div><div class="d">Small plot</div></label>
                </div>
                <div class="measure" id="acresBox">
                    <div class="measure-ttl">📐 Field Measurements</div>
                    <div class="field"><label class="label">🌿 Total Area (Acres) <span class="req">*</span></label><input type="number" class="input" id="acres" placeholder="e.g., 2.5" step="0.1" min="0.1"><p class="hint">1 acre = 4,047 sq meters</p></div>
                    <div class="gps-box">
                        <label class="label">📍 Field Location <span class="req">*</span></label>
                        <button type="button" class="gps-btn" id="gpsBtn" onclick="getGPSLocation()"><span id="gpsBtnText">📍 Get My Location</span><div class="spinner" id="gpsSpinner" style="display:none"></div></button>
                        <div class="gps-status" id="gpsStatus"></div>
                        <input type="hidden" id="latitude"><input type="hidden" id="longitude">
                        <div class="gps-result" id="gpsInfo"><div class="info"><strong>✅ Location Captured</strong><span id="gpsCoords"></span></div><button type="button" class="clear" onclick="clearGPS()">✕</button></div>
                        <p class="hint">Used to create a satellite map of your field</p>
                    </div>
                </div>
                <div class="measure" id="dimensionsBox">
                    <div class="measure-ttl">📏 Garden Measurements</div>
                    <div class="row">
                        <div class="field"><label class="label">Length (m) <span class="req">*</span></label><input type="number" class="input" id="landLength" placeholder="e.g., 50" step="0.1" min="1"></div>
                        <div class="field"><label class="label">Width (m) <span class="req">*</span></label><input type="number" class="input" id="landWidth" placeholder="e.g., 30" step="0.1" min="1"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-head"><span class="ico">🌱</span><span class="ttl">Crop Details</span></div>
                <div class="row">
                    <div class="field">
                        <label class="label">🌿 Main Crop <span class="req">*</span></label>
                        <select class="select" id="cropName" required>
                            <option value="">— Select —</option>
                            <option value="Rice">🌾 Rice</option><option value="Wheat">🌾 Wheat</option><option value="Maize">🌽 Maize</option><option value="Cotton">🌿 Cotton</option><option value="Sugarcane">🎋 Sugarcane</option><option value="Tomato">🍅 Tomato</option><option value="Potato">🥔 Potato</option><option value="Onion">🧅 Onion</option><option value="Chilli">🌶️ Chilli</option><option value="Groundnut">🥜 Groundnut</option><option value="Soybean">🫘 Soybean</option><option value="Apple">🍎 Apple</option><option value="Mango">🥭 Mango</option><option value="Banana">🍌 Banana</option><option value="Grapes">🍇 Grapes</option><option value="Other">📦 Other</option>
                        </select>
                    </div>
                    <div class="field">
                        <label class="label">💧 Watering</label>
                        <select class="select" id="wateringFrequency">
                            <option value="">— Optional —</option><option value="Daily">Daily</option><option value="Every 2-3 days">Every 2-3 days</option><option value="Weekly">Weekly</option><option value="Drip Irrigation">Drip Irrigation</option><option value="Rain-fed">Rain-fed only</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn"><span class="btn-text">✅ Save & Continue</span><div class="spinner"></div></button>
        </form>
    </div>

<script>
let selectedType=null;
function selectType(type){selectedType=type;document.getElementById('fieldOption').classList.toggle('on',type==='Field');document.getElementById('gardenOption').classList.toggle('on',type==='Garden');document.getElementById('acresBox').classList.toggle('show',type==='Field');document.getElementById('dimensionsBox').classList.toggle('show',type==='Garden')}
function showErr(m){document.getElementById('errText').textContent=m;document.getElementById('errAlert').classList.add('show');document.getElementById('okAlert').classList.remove('show');document.getElementById('errAlert').scrollIntoView({behavior:'smooth',block:'center'})}
function showOk(m){document.getElementById('okText').textContent=m;document.getElementById('okAlert').classList.add('show');document.getElementById('errAlert').classList.remove('show')}

function getGPSLocation(){
    const btn=document.getElementById('gpsBtn'),txt=document.getElementById('gpsBtnText'),sp=document.getElementById('gpsSpinner'),st=document.getElementById('gpsStatus');
    if(!navigator.geolocation){st.innerHTML='<span style="color:var(--red-500)">❌ GPS not supported</span>';return}
    txt.style.display='none';sp.style.display='block';st.innerHTML='<span style="color:var(--sky-600)">📡 Getting location...</span>';btn.disabled=true;
    navigator.geolocation.getCurrentPosition(
        pos=>{const lat=pos.coords.latitude,lon=pos.coords.longitude,acc=Math.round(pos.coords.accuracy);document.getElementById('latitude').value=lat;document.getElementById('longitude').value=lon;document.getElementById('gpsInfo').classList.add('show');document.getElementById('gpsCoords').textContent=`Lat: ${lat.toFixed(6)}, Lon: ${lon.toFixed(6)} (±${acc}m)`;st.innerHTML='<span style="color:var(--green-700)">✅ Location captured!</span>';txt.textContent='🔄 Update Location';txt.style.display='inline';sp.style.display='none';btn.disabled=false},
        err=>{let m='Location error';if(err.code===1)m='Permission denied';else if(err.code===2)m='Unavailable';else if(err.code===3)m='Timeout';st.innerHTML=`<span style="color:var(--red-500)">❌ ${m}</span>`;txt.textContent='📍 Retry';txt.style.display='inline';sp.style.display='none';btn.disabled=false},
        {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
}
function clearGPS(){document.getElementById('latitude').value='';document.getElementById('longitude').value='';document.getElementById('gpsInfo').classList.remove('show');document.getElementById('gpsStatus').innerHTML='';document.getElementById('gpsBtnText').textContent='📍 Get My Location'}

async function handleSubmit(e){
    e.preventDefault();document.getElementById('errAlert').classList.remove('show');document.getElementById('okAlert').classList.remove('show');
    if(!selectedType){showErr('Please select your land type');return}
    const data={farmer_name:document.getElementById('farmerName').value.trim(),village:document.getElementById('village').value.trim(),district:document.getElementById('district').value.trim(),state:document.getElementById('state').value,usage_type:selectedType,crop_name:document.getElementById('cropName').value,watering_frequency:document.getElementById('wateringFrequency').value||null};
    if(selectedType==='Field'){const a=document.getElementById('acres').value;if(!a||parseFloat(a)<=0){showErr('Please enter valid acres');return}data.acres=parseFloat(a);const lat=document.getElementById('latitude').value,lon=document.getElementById('longitude').value;if(!lat||!lon){showErr('Please capture your field location using GPS');return}data.latitude=parseFloat(lat);data.longitude=parseFloat(lon)}
    else{const l=document.getElementById('landLength').value,w=document.getElementById('landWidth').value;if(!l||!w||parseFloat(l)<=0||parseFloat(w)<=0){showErr('Please enter valid dimensions');return}data.land_length=parseFloat(l);data.land_width=parseFloat(w)}
    const btn=document.getElementById('submitBtn');btn.classList.add('loading');btn.disabled=true;
    try{const res=await fetch('/api/onboarding',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const r=await res.json();if(res.ok&&r.success){showOk(r.message+' Redirecting...');setTimeout(()=>window.location.href=r.redirect,1200)}else throw new Error(r.detail||'Something went wrong')}
    catch(err){showErr(err.message);btn.classList.remove('loading');btn.disabled=false}
}
</script>
</body>
</html>
